# SmartSched v3 — Docker Compose
# Uses: Go 1.26 API · React 19 frontend · PostgreSQL 17 · Bun (when available)

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ['3000:80']
    depends_on: [api]

  api:
    build: ./backend
    ports: ['8080:8080']
    environment:
      PORT: "8080"
      SKIP_AUTH: "true"
      DATABASE_URL: "postgresql://smartsched:secret@db:5432/smartsched?sslmode=disable"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
      JWT_SECRET: "dev-secret-change-in-production"
    depends_on:
      db: { condition: service_healthy }
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: smartsched
      POSTGRES_USER: smartsched
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports: ['5432:5432']
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartsched"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
